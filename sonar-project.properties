# SonarQube Configuration for BoycottPro React Native UI
# Project Information
sonar.projectKey=boycottproui
sonar.projectName=BoycottPro React Native UI
sonar.projectVersion=1.0.0

# Source and Test Directories
sonar.sources=src
sonar.tests=src/__tests__
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Language Configuration
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Coverage Configuration
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/__tests__/**/*,**/*.stories.ts,**/*.stories.tsx

# File Exclusions
sonar.exclusions=node_modules/**/*,coverage/**/*,.expo/**/*,android/**/*,ios/**/*,*.json,*.md

# Quality Gate Thresholds (90% coverage requirement)
sonar.coverage.minimum=90.0
sonar.duplicated_lines_density.maximum=3.0

# Environment-Specific Analysis Support
# These can be overridden via command line for environment-specific analysis:
# sonar-scanner -Dsonar.projectKey=boycottproui-dev -Dsonar.analysis.environment=dev

# TypeScript Configuration
sonar.typescript.tsconfigPath=tsconfig.json

# Source Encoding
sonar.sourceEncoding=UTF-8

# Analysis Mode
sonar.analysis.mode=publish